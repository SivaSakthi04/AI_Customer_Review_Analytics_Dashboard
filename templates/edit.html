{% extends "layout.html" %}

{% block content %}

<div class="container mt-4">

<div class="row justify-content-center">

<div class="col-md-8">

<div class="card shadow">

<div class="card-header bg-warning">

<h3>✏ Edit Customer Review</h3>

</div>

<div class="card-body">

<form method="POST">

<div class="mb-3">

<label class="form-label">

Customer Review

</label>

<textarea
class="form-control"
name="review"
rows="6"
required>{{ review[1] }}</textarea>

</div>

<button class="btn btn-success">

💾 Update Review

</button>

<a href="/history" class="btn btn-secondary">

Cancel

</a>

</form>

</div>

</div>

</div>

</div>

</div>

{% endblock %}
